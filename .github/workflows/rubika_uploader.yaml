name: Download & Send Files via Rubika

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'Space-separated direct URLs of files to download'
        required: true
        type: string

jobs:
  download_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl zip jq

      - name: Download files with unique names
        id: download
        run: |
          # Read the space-separated URLs into an array
          IFS=' ' read -r -a urls <<< "${{ github.event.inputs.file_urls }}"
          mkdir -p downloads
          cd downloads

          declare -A name_count  # track duplicate filenames

          for url in "${urls[@]}"; do
            [ -z "$url" ] && continue   # skip empty strings
            echo "Downloading: $url"

            # Extract base filename, strip query string
            raw_name=$(basename "$url" | sed 's/?.*//')
            base="${raw_name%.*}"        # name without extension
            ext="${raw_name##*.}"        # extension (if any)
            # Handle files with no extension
            if [ "$base" = "$ext" ]; then
              ext=""
            else
              ext=".$ext"
            fi

            # Determine unique filename inside downloads/
            if [ -z "${name_count[$raw_name]}" ]; then
              final_name="$raw_name"
              name_count[$raw_name]=1
            else
              count=${name_count[$raw_name]}
              final_name="${base}_${count}${ext}"
              name_count[$raw_name]=$((count + 1))
            fi

            curl -fsSL -o "$final_name" "$url"
            echo "Saved as: $final_name"
          done

          cd ..
          echo "files_downloaded=true" >> $GITHUB_OUTPUT

      - name: Zip with maximum compression & split into 50 MB chunks
        id: zip
        run: |
          cd downloads
          # Zip all downloaded files (names are unique)
          zip -9 -s 50m ../archive.zip *
          cd ..
          ls -la archive.*
          CHUNKS=$(ls archive.* | tr '\n' ' ')
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT

      - name: Send each chunk to Rubika
        env:
          BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.RUBIKA_CHAT_ID }}
        run: |
          for chunk in ${{ steps.zip.outputs.chunks }}; do
            echo "--------------------------------------------------"
            echo "Processing: $chunk"

            # 1) Request upload URL (type="File")
            REQ_RESP=$(curl -sS -X POST \
              "https://botapi.rubika.ir/v3/${BOT_TOKEN}/requestSendFile" \
              -H "Content-Type: application/json" \
              -d '{"type": "File"}')
            echo "requestSendFile response: $REQ_RESP"

            UPLOAD_URL=$(echo "$REQ_RESP" | jq -r '.data.upload_url')
            if [ "$UPLOAD_URL" = "null" ] || [ -z "$UPLOAD_URL" ]; then
              echo "❌ Could not obtain upload URL"
              exit 1
            fi

            # 2) Upload the chunk
            UPLOAD_RESP=$(curl -sS -X POST "$UPLOAD_URL" \
              -F "file=@$chunk")
            echo "Upload response: $UPLOAD_RESP"

            FILE_ID=$(echo "$UPLOAD_RESP" | jq -r '.data.file_id')
            if [ "$FILE_ID" = "null" ] || [ -z "$FILE_ID" ]; then
              echo "❌ Could not obtain file_id"
              exit 1
            fi

            # 3) Send the chunk to the chat
            SEND_RESP=$(curl -sS -X POST \
              "https://botapi.rubika.ir/v3/${BOT_TOKEN}/sendFile" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${CHAT_ID}\", \"file_id\": \"${FILE_ID}\", \"text\": \"Chunk: ${chunk}\"}")
            echo "sendFile response: $SEND_RESP"

            echo "✅ $chunk sent"
          done
          echo "All chunks delivered."

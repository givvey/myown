name: Web Archive Crawl

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to crawl"
        required: true
        type: string
      collection:
        description: "Collection name (used for the output filename)"
        required: true
        type: string
        default: "crawl"
      workers:
        description: "Number of parallel workers"
        required: false
        type: string
        default: "4"
      scope_exclude_rx:
        description: >
          Regex of URLs to exclude from the crawl (passed to --scopeExcludeRx).
          Leave blank to crawl everything in scope.
          Example — exclude all non-English FastAPI docs:
            https://fastapi\.tiangolo\.com/[a-z]{2}(-[a-z]+)?(/|$)
        required: false
        type: string
        default: ""

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Crawls can be long — raise the timeout as needed
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull browsertrix-crawler image
        run: docker pull webrecorder/browsertrix-crawler

      - name: Create crawl output directory
        run: mkdir -p crawls

      - name: Run crawler
        run: |
          # Build the optional --scopeExcludeRx flag so the docker command
          # stays clean regardless of whether the input was provided.
          # The input is read from an env var to avoid shell-injection from
          # regex metacharacters being interpolated directly into the script.
          EXCLUDE_FLAG=""
          if [ -n "$SCOPE_EXCLUDE_RX" ]; then
            EXCLUDE_FLAG="--scopeExcludeRx $SCOPE_EXCLUDE_RX"
          fi

          docker run \
            --rm \
            -v "${{ github.workspace }}/crawls:/crawls" \
            webrecorder/browsertrix-crawler \
            crawl \
              --url "${{ github.event.inputs.url }}" \
              --collection "${{ github.event.inputs.collection }}" \
              --scopeType prefix \
              --workers "${{ github.event.inputs.workers }}" \
              --behaviors autofetch,autoscroll \
              --waitUntil networkidle0 \
              --generateWACZ \
              $EXCLUDE_FLAG
        env:
          SCOPE_EXCLUDE_RX: ${{ github.event.inputs.scope_exclude_rx }}

      - name: Locate WACZ file
        id: find_wacz
        run: |
          WACZ_PATH=$(find crawls -name "*.wacz" | head -n 1)

          if [ -z "$WACZ_PATH" ]; then
            echo "No WACZ file found — crawl may have failed."
            exit 1
          fi

          echo "wacz_path=$WACZ_PATH" >> "$GITHUB_OUTPUT"
          echo "Found WACZ: $WACZ_PATH"
          ls -lh "$WACZ_PATH"

      - name: Commit WACZ to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.find_wacz.outputs.wacz_path }}"

          # Only commit if there is something staged
          if git diff --cached --quiet; then
            echo "Nothing to commit — WACZ unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: add WACZ archive for ${{ github.event.inputs.collection }} ($TIMESTAMP)"
            git push
          fi

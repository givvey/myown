# .github/workflows/download-file.yml
name: Download and commit file

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the file to download'
        required: true

permissions:
  contents: write          # needed to push commits (including LFS objects)

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git LFS
        run: |
          if ! command -v git-lfs &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y git-lfs
          fi
          git lfs install

      - name: Download and commit file
        env:
          URL: ${{ github.event.inputs.url }}
        run: |
          # Extract filename from URL (strip query parameters)
          FILENAME=$(basename "$URL" | cut -d'?' -f1)
          echo "Downloading $URL → $FILENAME"

          curl -fSL -o "$FILENAME" "$URL"

          # Check file size (in bytes)
          SIZE=$(stat -c%s "$FILENAME")
          echo "File size: $SIZE bytes"

          # Use Git LFS for files > 50 MB (52428800 bytes)
          if [ "$SIZE" -gt 52428800 ]; then
            echo "File is >50 MB → enabling Git LFS"
            git lfs track "$FILENAME"
            git add .gitattributes
          fi

          git add "$FILENAME"

          # Only commit if something is actually staged
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add downloaded file: $FILENAME"
          git push

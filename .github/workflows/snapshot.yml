name: Webpage Snapshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL of the webpage to snapshot"
        required: true
        default: "https://example.com"
      filename:
        description: "Output filename (without extension)"
        required: false
        default: "snapshot"
      wait_ms:
        description: "Extra time (ms) to wait after page load for JS rendering"
        required: false
        default: "3000"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # single-file-cli is the official CLI of the SingleFile extension.
      # It ships its own Chromium via @puppeteer/browsers so no separate
      # browser install step is needed.
      - name: Install single-file-cli
        run: npm install -g single-file-cli

      - name: Install Chromium for single-file-cli
        run: |
          # single-file-cli resolves the browser via the SINGLE_FILE_BROWSER
          # env var or auto-downloads one. We install it explicitly so we can
          # pin the path and avoid the interactive prompt.
          npx @puppeteer/browsers install chrome@stable --path "$HOME/.chrome"
          CHROME_BIN=$(find "$HOME/.chrome" -name "chrome" -type f | head -n 1)
          echo "CHROME_BIN=$CHROME_BIN" >> $GITHUB_ENV

      - name: Set snapshot variables
        id: vars
        run: |
          URL="${{ github.event.inputs.url || 'https://example.com' }}"
          FILENAME="${{ github.event.inputs.filename || 'snapshot' }}"
          WAIT_MS="${{ github.event.inputs.wait_ms || '3000' }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          echo "url=$URL"                    >> $GITHUB_OUTPUT
          echo "filename=$FILENAME"          >> $GITHUB_OUTPUT
          echo "wait_ms=$WAIT_MS"            >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"        >> $GITHUB_OUTPUT
          echo "output_file=${FILENAME}.html" >> $GITHUB_OUTPUT

      - name: Write lazy-load scroll script
        run: |
          cat << 'JS' > /tmp/scroll-trigger.js
          // Scrolls the full page height in increments to trigger
          // IntersectionObserver, scroll-event listeners, and any
          // JS-driven lazy loading. Waits for network to settle after
          // each batch, then scrolls back to the top.
          (async () => {
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const pageHeight = () => document.documentElement.scrollHeight;

            let pos = 0;
            const step = Math.floor(window.innerHeight * 0.8);

            while (pos < pageHeight()) {
              window.scrollTo(0, pos);
              // Fire scroll event explicitly for listeners that check it
              window.dispatchEvent(new Event('scroll'));
              await sleep(120);
              pos += step;
            }

            // Pause at the bottom so final lazy assets can start loading
            await sleep(1500);
            window.scrollTo(0, 0);
            await sleep(500);
          })();
          JS

      - name: Capture single-file snapshot
        run: |
          single-file \
            "${{ steps.vars.outputs.url }}" \
            "${{ steps.vars.outputs.output_file }}" \
            --browser-executable-path="$CHROME_BIN" \
            --browser-args='["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage"]' \
            --browser-wait-until=networkIdle \
            --browser-wait-until-fallback=true \
            --browser-wait-delay="${{ steps.vars.outputs.wait_ms }}" \
            --browser-script=/tmp/scroll-trigger.js \
            --block-scripts=false \
            --block-mixed-content=false \
            --block-alternative-images=false \
            --self-extracting-archive=false \
            --compress-HTML=false \
            --load-deferred-images=true \
            --load-deferred-images-dispatch-scroll-event=true \
            --load-deferred-images-max-idle-time=5000 \
            --load-deferred-images-before-frames=true \
            --remove-hidden-elements=false \
            --remove-unused-styles=false \
            --remove-unused-fonts=false \
            --remove-alternative-fonts=false \
            --remove-frames=false \
            --resolve-links=true \
            --insert-single-file-comment=true

          SIZE=$(du -sh "${{ steps.vars.outputs.output_file }}" | cut -f1)
          echo "✅ Snapshot saved: ${{ steps.vars.outputs.output_file }} ($SIZE)"

      - name: Commit snapshot to repository
        run: |
          DEST_DIR="snapshots"
          TIMESTAMP="${{ steps.vars.outputs.timestamp }}"
          FILENAME="${{ steps.vars.outputs.filename }}"
          OUTPUT_FILE="${{ steps.vars.outputs.output_file }}"

          mkdir -p "$DEST_DIR"

          # Timestamped archive copy
          cp "$OUTPUT_FILE" "$DEST_DIR/${FILENAME}-${TIMESTAMP}.html"

          # Stable "latest" pointer — easy to link or embed
          cp "$OUTPUT_FILE" "$DEST_DIR/${FILENAME}-latest.html"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$DEST_DIR/"
          git diff --cached --quiet && echo "No changes to commit." && exit 0

          git commit -m "chore: snapshot ${{ steps.vars.outputs.url }} @ ${TIMESTAMP}"
          git push

name: Download & Send Files via Rubika

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'Direct URLs of the files to download (one per line)'
        required: true
        type: string

jobs:
  download_and_send:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl zip jq

      - name: Process each URL
        env:
          BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.RUBIKA_CHAT_ID }}
          URLS:      ${{ inputs.file_urls }}
        run: |
          set -e
          i=1
          # Read URLs line by line (ignore empty lines)
          while IFS= read -r url; do
            # Skip empty lines
            [[ -z "$url" ]] && continue
            echo "=========================================="
            echo "Processing file #$i: $url"

            # Download with a unique local name to avoid collisions
            DOWNLOAD_NAME="download_${i}"
            curl -fsSL -o "$DOWNLOAD_NAME" "$url"

            # Compress with maximum level and split into 50MiB chunks
            ARCHIVE_PREFIX="archive_${i}"
            zip -9 -s 50m "${ARCHIVE_PREFIX}.zip" "$DOWNLOAD_NAME"
            rm -f "$DOWNLOAD_NAME"  # no longer needed

            # List chunks in correct numerical order
            CHUNKS=$(ls -v ${ARCHIVE_PREFIX}.z* ${ARCHIVE_PREFIX}.zip 2>/dev/null)
            if [[ -z "$CHUNKS" ]]; then
              # In case zip produced only one part (no .z01, just .zip)
              CHUNKS="${ARCHIVE_PREFIX}.zip"
            fi

            for chunk in $CHUNKS; do
              echo "  Uploading chunk: $chunk"

              # 1) Request upload URL
              REQ_RESP=$(curl -sS -X POST \
                "https://botapi.rubika.ir/v3/${BOT_TOKEN}/requestSendFile" \
                -H "Content-Type: application/json" \
                -d '{"type": "File"}')
              UPLOAD_URL=$(echo "$REQ_RESP" | jq -r '.upload_url')
              if [[ "$UPLOAD_URL" == "null" || -z "$UPLOAD_URL" ]]; then
                echo "❌ Could not obtain upload URL"
                exit 1
              fi

              # 2) Upload the chunk
              UPLOAD_RESP=$(curl -sS -X POST "$UPLOAD_URL" \
                -F "file=@$chunk")
              FILE_ID=$(echo "$UPLOAD_RESP" | jq -r '.file_id')
              if [[ "$FILE_ID" == "null" || -z "$FILE_ID" ]]; then
                echo "❌ Could not obtain file_id"
                exit 1
              fi

              # 3) Send to Rubika chat
              SEND_RESP=$(curl -sS -X POST \
                "https://botapi.rubika.ir/v3/${BOT_TOKEN}/sendFile" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${CHAT_ID}\", \"file_id\": \"${FILE_ID}\", \"text\": \"File #$i chunk: $chunk\"}")
              echo "  ✅ Sent"
            done

            # Clean up archive parts for this file
            rm -f ${ARCHIVE_PREFIX}.z* ${ARCHIVE_PREFIX}.zip
            ((i++))
          done <<< "$URLS"

          echo "All files processed and sent."

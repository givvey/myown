name: Pull Docker Image and Commit

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'Docker image to pull (e.g. alpine:latest or ghcr.io/owner/repo:tag)'
        required: true
        type: string

# Grant write access to the repository contents
permissions:
  contents: write

jobs:
  pull-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to avoid conflicts when pushing
          fetch-depth: 0

      - name: Pull Docker image
        run: docker pull ${{ github.event.inputs.image_url }}

      - name: Save image with all layers to file
        run: |
          # Create a safe filename by replacing '/' and ':' with '_'
          SAFE_NAME=$(echo "${{ github.event.inputs.image_url }}" | tr '/:' '_')
          FILE_NAME="${SAFE_NAME}.tar.gz"

          echo "Saving image to ${FILE_NAME}"
          docker save ${{ github.event.inputs.image_url }} | gzip > "${FILE_NAME}"

          # Export the filename for later steps
          echo "IMAGE_FILE=${FILE_NAME}" >> $GITHUB_ENV

      - name: Commit and push the image file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ env.IMAGE_FILE }}"
          git commit -m "Add Docker image ${{ github.event.inputs.image_url }}" || echo "No changes to commit"
          git push

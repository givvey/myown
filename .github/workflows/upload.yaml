name: Download and Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "URL of the file to download"
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Download file
        run: |
          curl -L "${{ github.event.inputs.file_url }}" -o downloaded_file

      - name: Upload to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python <<EOF
          import os
          import json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Load credentials
          creds_dict = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])
          credentials = service_account.Credentials.from_service_account_info(
              creds_dict,
              scopes=["https://www.googleapis.com/auth/drive"]
          )

          service = build("drive", "v3", credentials=credentials)

          file_metadata = {
              "name": "downloaded_file",
          }

          folder_id = os.environ.get("FOLDER_ID")
          if folder_id:
              file_metadata["parents"] = [folder_id]

          media = MediaFileUpload("downloaded_file", resumable=True)

          file = service.files().create(
              body=file_metadata,
              media_body=media,
              fields="id"
          ).execute()

          print("Uploaded file ID:", file.get("id"))
          EOF
